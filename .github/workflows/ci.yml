name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # 允许 Release job 上传 assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 禁用 progress bar，减少 CI 日志噪音
  CARGO_INCREMENTAL: 0

jobs:
  # Windows：全量验证（fmt + clippy + test + build + run smoke）
  windows:
    name: Windows (full)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt check
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: build
        run: cargo build --workspace

      - name: run smoke (ZDOWN_SMOKE)
        run: cargo run -p zdown-app
        env:
          ZDOWN_SMOKE: "1"

  # Linux：仅编译验证（无 GUI runner）
  linux:
    name: Linux (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install eframe system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev
          # 注：rfd（阶段 1 引入）在 Linux 依赖 gtk，libgtk-3-dev 已包含上方。
          # CI 无 DISPLAY，rfd::FileDialog::pick_file 返回 None，不跑对话框测试。

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: build
        run: cargo build --workspace

  # macOS：仅编译验证
  macos:
    name: macOS (build only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: build
        run: cargo build --workspace

  # ── Release 构建：tag push 时构建全平台 release binary 并上传 ──
  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            binary: zdown.exe
          - os: ubuntu-latest
            target: linux-x86_64
            binary: zdown
          - os: macos-latest
            target: macos-x86_64
            binary: zdown
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libvulkan-dev

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p zdown-app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "zdown-${{ github.ref_name }}-windows-x86_64.zip"
          Compress-Archive -Path target/release/zdown-app.exe -DestinationPath $asset

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/release/zdown-app zdown
          tar -czf zdown-${{ github.ref_name }}-linux-x86_64.tar.gz zdown

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cp target/release/zdown-app zdown
          zip zdown-${{ github.ref_name }}-macos-x86_64.zip zdown

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zdown-*.zip
            zdown-*.tar.gz
