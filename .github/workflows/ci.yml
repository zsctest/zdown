name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 禁用 progress bar，减少 CI 日志噪音
  CARGO_INCREMENTAL: 0

jobs:
  # Windows：全量验证（fmt + clippy + test + build + run smoke）
  windows:
    name: Windows (full)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt check
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: build
        run: cargo build --workspace

      - name: run smoke (ZDOWN_SMOKE)
        run: cargo run -p zdown-app
        env:
          ZDOWN_SMOKE: "1"

  # Linux：仅编译验证（无 GUI runner）
  linux:
    name: Linux (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install eframe system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev
          # 注：rfd（阶段 1 引入）在 Linux 依赖 gtk，libgtk-3-dev 已包含上方。
          # CI 无 DISPLAY，rfd::FileDialog::pick_file 返回 None，不跑对话框测试。

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: build
        run: cargo build --workspace

  # macOS：仅编译验证
  macos:
    name: macOS (build only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: build
        run: cargo build --workspace
